<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="page-container">

        <div class="dashboard-card">

            <h1 class="page-title">Evaluation Result</h1>

            <div class="text-center">

                <div class="result-score">
                    {{ score }}<span class="max-marks">/ {{ max_marks }}</span>
                </div>

                <p class="page-subtitle">
                    Suggested Marks
                </p>

            </div>

            <div class="feedback-box">
                <h3 style="color: #8b5cf6; margin-bottom: 12px;">AI Feedback</h3>
                {{ feedback }}
            </div>

            <div class="button-group">
                <a href="/download-result" class="btn-primary-custom" style="display: inline-block; width: auto; padding: 12px 28px;">
                    📥 Download as PDF
                </a>
                <a href="/dashboard" class="btn-secondary-custom">
                    Evaluate Another Answer
                </a>
            </div>

        </div>

    </div>

</body>
</html>
