<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#030712;
    overflow:hidden;
}

.card-box{
    width:100%;
    max-width:450px;
    padding:40px;

    background:rgba(15,23,42,.8);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;

    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.title{
    color:white;
    text-align:center;
    font-weight:800;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.form-control{
    background:#0f172a;
    border:1px solid rgba(255,255,255,.1);
    color:white;
}

.form-control:focus{
    background:#0f172a;
    color:white;
    border-color:#6366f1;
    box-shadow:none;
}

.btn-signup{
    width:100%;
    border:none;
    padding:12px;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #8b5cf6,
        #3b82f6
    );

    color:white;
    font-weight:700;
}

.bottom-link{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}

.bottom-link a{
    color:#8b5cf6;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card-box">

    <h1 class="title">
        Create Account
    </h1>

    <p class="subtitle">
        Save your evaluation history forever
    </p>

    <form method="POST">

        <div class="mb-3">
            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Email"
                required
            >
        </div>

        <div class="mb-3">
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
            >
        </div>

        <button class="btn-signup">
            Sign Up
        </button>

    </form>

    <div class="bottom-link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
