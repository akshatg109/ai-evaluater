
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Responses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <a class="brand" href="/teacher">
                AI<span>Evaluator</span>
            </a>

            <div class="navbar-nav ms-auto gap-2">
                <a class="nav-link" href="/teacher">Teacher</a>
                <a class="nav-link" href="/student">Student</a>
                <a class="nav-link active" href="/responses">Responses</a>
            </div>

        </div>
    </nav>

    <div class="page-container">

        <div class="dashboard-card">

            <h1 class="page-title">Student Responses</h1>

            <p class="page-subtitle">
                View submitted answers, suggested marks, and feedback.
            </p>

            <div class="table-responsive">

                <table class="table table-dark table-hover table-custom align-middle">

                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Student Answer</th>
                            <th>Marks</th>
                            <th>Feedback</th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for r in responses %}
                        <tr>
                            <td>{{ r[1] }}</td>
                            <td>{{ r[2] }}</td>
                            <td>
                                <span class="badge-marks">
                                    {{ r[3] }}
                                </span>
                            </td>
                            <td>{{ r[4] }}</td>
                        </tr>
                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>
</html>
