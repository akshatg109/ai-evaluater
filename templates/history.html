<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evaluation History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#030712;
    color:white;
    min-height:100vh;
}

.container-box{
    max-width:1200px;
    margin:50px auto;
    padding:30px;
}

.title{
    font-size:3rem;
    font-weight:800;
    margin-bottom:20px;
}

.back-btn{
    text-decoration:none;
    color:#a78bfa;
    font-weight:600;
}

.history-card{
    background:rgba(15,23,42,.8);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
}

.score-badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:12px;

    background:linear-gradient(
        135deg,
        #8b5cf6,
        #3b82f6
    );

    font-weight:700;
}

.date{
    color:#94a3b8;
    font-size:.9rem;
}

.feedback{
    color:#cbd5e1;
    line-height:1.7;
    margin-top:15px;
}

.empty{
    text-align:center;
    color:#94a3b8;
    padding:60px;
}

</style>
</head>

<body>

<div class="container-box">

    <a href="/dashboard" class="back-btn">
        ← Back to Dashboard
    </a>

    <h1 class="title">
        Evaluation History
    </h1>

    {% if evaluations %}

        {% for eval in evaluations %}

        <div class="history-card">

            <div class="d-flex justify-content-between align-items-center">

                <div class="date">
                    {{ eval.created_at }}
                </div>

                <div class="score-badge">
                    Score: {{ eval.score }}
                </div>

            </div>

            <div class="feedback">
                {{ eval.feedback }}
            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="history-card empty">

            <h3>No evaluations yet</h3>

            <p>
                Upload an answer sheet and your evaluation history will appear here.
            </p>

        </div>

    {% endif %}

</div>

</body>
</html>
