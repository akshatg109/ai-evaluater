```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <a class="brand" href="/teacher">
                AI<span>Evaluator</span>
            </a>

            <div class="navbar-nav ms-auto gap-2">
                <a class="nav-link" href="/teacher">Teacher</a>
                <a class="nav-link active" href="/student">Student</a>
                <a class="nav-link" href="/responses">Responses</a>
            </div>

        </div>
    </nav>

    <div class="page-container">

        <div class="dashboard-card">

            <h1 class="page-title">Student Panel</h1>

            <p class="page-subtitle">
                Submit your answer and receive instant feedback.
            </p>

            <form method="POST">

                <label for="question_id" class="form-label">
                    Select Question
                </label>

                <select
                    id="question_id"
                    name="question_id"
                    class="form-select"
                    required>

                    {% for q in questions %}
                        <option value="{{ q[0] }}">
                            {{ q[1] }}
                        </option>
                    {% endfor %}

                </select>

                <label for="student_answer" class="form-label mt-4">
                    Your Answer
                </label>

                <textarea
                    id="student_answer"
                    name="student_answer"
                    class="form-control"
                    rows="8"
                    placeholder="Type your answer here..."
                    required></textarea>

                <button type="submit" class="btn-primary-custom mt-4">
                    Submit Answer
                </button>

            </form>

        </div>

    </div>

</body>
</html>
```
