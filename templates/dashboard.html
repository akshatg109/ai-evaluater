<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Answer Sheet Evaluator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="page-container">

        <div class="dashboard-card">

            <div class="text-center mb-5">

                <h1 class="page-title">
                    AI Answer Sheet Evaluator
                </h1>

                <p class="page-subtitle">
                    Upload a question paper and a student's answer sheet to receive AI-generated marks and feedback.
                </p>

            </div>

            <form action="/evaluate" method="POST" enctype="multipart/form-data">

                <label class="form-label">
                    Question Paper
                </label>

                <input
                    type="file"
                    name="question_file"
                    class="form-control"
                    accept=".pdf,image/*"
                    required>

                <label class="form-label mt-4">
                    Student Answer Sheet
                </label>

                <input
                    type="file"
                    name="answer_file"
                    class="form-control"
                    accept=".pdf,image/*"
                    required>

                <button
                    type="submit"
                    class="btn-primary-custom mt-4">
                    Evaluate Answer Sheet
                </button>

            </form>

        </div>

    </div>

</body>
</html>
