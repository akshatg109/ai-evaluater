<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - AI Answer Sheet Evaluator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#030712;
            overflow:hidden;
            position:relative;
        }

        .bg-orb{
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
        }

        .orb-1{
            width:400px;
            height:400px;
            background:rgba(99,102,241,.30);
            top:-120px;
            left:-120px;
        }

        .orb-2{
            width:350px;
            height:350px;
            background:rgba(168,85,247,.25);
            bottom:-100px;
            right:-100px;
        }

        .card-box{
            position:relative;
            z-index:2;

            width:100%;
            max-width:450px;
            padding:40px;

            background:rgba(15,23,42,.75);
            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.08);
            border-radius:24px;

            box-shadow:0 25px 60px rgba(0,0,0,.45);
        }

        .logo{
            text-align:center;
            font-size:52px;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            color:white;
            font-weight:800;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#94a3b8;
            margin-bottom:30px;
        }

        .form-control{
            background:#0f172a;
            border:1px solid rgba(255,255,255,.1);
            color:white;
            padding:12px;
        }

        .form-control:focus{
            background:#0f172a;
            color:white;
            border-color:#6366f1;
            box-shadow:none;
        }

        .btn-login{
            width:100%;
            border:none;
            padding:14px;

            border-radius:12px;

            background:linear-gradient(
                135deg,
                #8b5cf6,
                #3b82f6
            );

            color:white;
            font-weight:700;

            transition:.3s;
        }

        .btn-login:hover{
            transform:translateY(-2px);
        }

        .bottom-link{
            text-align:center;
            margin-top:20px;
            color:#94a3b8;
        }

        .bottom-link a{
            color:#8b5cf6;
            text-decoration:none;
            font-weight:600;
        }

        .bottom-link a:hover{
            color:#a78bfa;
        }

        .home-link{
            display:block;
            text-align:center;
            margin-top:15px;
            color:#94a3b8;
            text-decoration:none;
        }

        .home-link:hover{
            color:white;
        }

    </style>
</head>

<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="card-box">

        <div class="logo">
            🤖
        </div>

        <h1 class="title">
            Welcome Back
        </h1>

        <p class="subtitle">
            Login to access your evaluation history
        </p>

        <form method="POST">

            <div class="mb-3">
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email Address"
                    required
                >
            </div>

            <div class="mb-3">
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                Login
            </button>

        </form>

        <div class="bottom-link">
            Don't have an account?
            <a href="/signup">Create Account</a>
        </div>

        <a href="/" class="home-link">
            ← Back to Home
        </a>

    </div>

</body>
</html>
