```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <a class="brand" href="/teacher">
                AI<span>Evaluator</span>
            </a>

            <div class="navbar-nav ms-auto gap-2">
                <a class="nav-link active" href="/teacher">Teacher</a>
                <a class="nav-link" href="/student">Student</a>
                <a class="nav-link" href="/responses">Responses</a>
            </div>

        </div>
    </nav>

    <div class="page-container">

        <div class="dashboard-card">

            <h1 class="page-title">Teacher Panel</h1>

            <p class="page-subtitle">
                Create questions and define evaluation criteria.
            </p>

            <form method="POST">

                <label for="question" class="form-label">
                    Question
                </label>

                <textarea
                    id="question"
                    name="question"
                    class="form-control"
                    rows="4"
                    placeholder="Enter the question here..."
                    required></textarea>

                <label for="model_answer" class="form-label mt-4">
                    Model Answer
                </label>

                <textarea
                    id="model_answer"
                    name="model_answer"
                    class="form-control"
                    rows="5"
                    placeholder="Enter the ideal answer..."
                    required></textarea>

                <label for="keywords" class="form-label mt-4">
                    Keywords (comma separated)
                </label>

                <input
                    type="text"
                    id="keywords"
                    name="keywords"
                    class="form-control"
                    placeholder="Example: queue, FIFO, linear data structure"
                    required>

                <label for="max_marks" class="form-label mt-4">
                    Maximum Marks
                </label>

                <input
                    type="number"
                    id="max_marks"
                    name="max_marks"
                    class="form-control"
                    min="1"
                    max="100"
                    placeholder="Enter maximum marks"
                    required>

                <button type="submit" class="btn-primary-custom mt-4">
                    Add Question
                </button>

            </form>

            <h2 class="mt-5 mb-4">Saved Questions</h2>

            {% for q in questions %}
                <<div class="question-card">

    <h5>{{ q[1] }}</h5>

    <p class="text-secondary mb-3">
        Keywords: {{ q[3] }}
    </p>

    <span class="badge-marks">
        {{ q[4] }} Marks
    </span>

</div>
            {% endfor %}

        </div>

    </div>

</body>
</html>
